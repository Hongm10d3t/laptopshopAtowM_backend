services:
  mysql:
    image: mysql:8.0
    container_name: laptophub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-laptophub}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - laptophub-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  laptophub-mysql-data:
